<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDIRECTOR</title>
    <style>
        /* Цветовая палитра "Яркий Аметист" */
        :root {
            --amethyst-dark: #120324;
            --amethyst-bg: #2d1045;
            --amethyst-primary: #a855f7;
            --amethyst-light: #d8b4e2;
            --amethyst-glow: rgba(168, 85, 247, 0.6);
            --amethyst-bright: #c084fc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, var(--amethyst-bg) 0%, var(--amethyst-dark) 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Основной контейнер-кристалл */
        .panel-container {
            background: rgba(45, 16, 69, 0.4);
            backdrop-filter: blur(15px);
            border: 1px solid var(--amethyst-primary);
            box-shadow: 0 0 40px var(--amethyst-glow), inset 0 0 20px rgba(168, 85, 247, 0.2);
            border-radius: 24px;
            padding: 40px 50px;
            width: 90%;
            max-width: 800px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Блики для эффекта кристалла */
        .panel-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 100%);
            transform: rotate(30deg);
            pointer-events: none;
        }

        h1 {
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 15px var(--amethyst-bright), 0 0 30px var(--amethyst-primary);
            margin-bottom: 40px;
            font-weight: 800;
        }

        .groups-wrapper {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Карточки групп (классов) */
        .group {
            flex: 1;
            min-width: 260px;
            background: rgba(168, 85, 247, 0.05);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 16px;
            padding: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .group:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px var(--amethyst-glow);
            border-color: var(--amethyst-bright);
        }

        .group h2 {
            color: var(--amethyst-light);
            font-size: 1.6em;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--amethyst-primary);
            padding-bottom: 12px;
            text-shadow: 0 0 10px rgba(216, 180, 226, 0.5);
        }

        /* Кнопки ссылок */
        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 18px;
            background: linear-gradient(135deg, #7e22ce, #a855f7);
            color: #fff;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 12px;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid transparent;
            box-shadow: 0 4px 15px rgba(126, 34, 206, 0.5);
        }

        .btn:last-child {
            margin-bottom: 0;
        }

        .btn:hover {
            background: linear-gradient(135deg, #a855f7, #c084fc);
            border-color: #fff;
            box-shadow: 0 0 20px var(--amethyst-bright), 0 0 40px var(--amethyst-primary);
            transform: scale(1.04);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .emoji {
            margin-right: 12px;
            font-size: 1.4em;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }
    </style>
</head>
<body>

    <div class="panel-container">
        <h1>REDIRECTING SYSTEM</h1>
        
        <div class="groups-wrapper">
            <div class="group">
                <h2>8-9 Grades</h2>
                <a href="https://leaderboar.github.io/edit" target="_blank" class="btn">
                    <span class="emoji">⚙️</span> CONTROL PANEL
                </a>
                <a href="https://piima-im.github.io/EnglishVocabulary" target="_blank" class="btn">
                    <span class="emoji">👁️</span> SPECTATOR
                </a>
            </div>

            <div class="group">
                <h2>6-7 Grades</h2>
                <a href="https://leaderboarb.github.io/edit" target="_blank" class="btn">
                    <span class="emoji">⚙️</span> CONTROL PANEL
                </a>
                <a href="https://margilon-im.github.io/EnglishVocabulary" target="_blank" class="btn">
                    <span class="emoji">👁️</span> SPECTATOR
                </a>
            </div>
        </div>
    </div>

</body>
</html>
